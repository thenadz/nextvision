[workspace]
resolver = "2"
members = [
    "nv-core",
    "nv-frame",
    "nv-media",
    "nv-perception",
    "nv-temporal",
    "nv-view",
    "nv-runtime",
    "nv-test-util",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT OR Apache-2.0"

[workspace.dependencies]
# Internal crates
nv-core = { path = "nv-core" }
nv-frame = { path = "nv-frame" }
nv-media = { path = "nv-media" }
nv-perception = { path = "nv-perception" }
nv-temporal = { path = "nv-temporal" }
nv-view = { path = "nv-view" }
nv-runtime = { path = "nv-runtime" }
nv-test-util = { path = "nv-test-util" }

# External
criterion = { version = "0.5", features = ["html_reports"] }
thiserror = "2"
tokio = { version = "1", features = ["rt-multi-thread", "sync", "macros", "time"] }
tracing = "0.1"
