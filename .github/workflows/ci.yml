name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  # --------------------------------------------------------------------------
  # Format check — fast, runs first
  # --------------------------------------------------------------------------
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # --------------------------------------------------------------------------
  # Lint, build, test, doc — primary gate
  # --------------------------------------------------------------------------
  check:
    name: Check (${{ matrix.toolchain }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        toolchain: [stable]
    needs: fmt
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy

      - name: Install GStreamer dev libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev

      - uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace --all-targets

      - name: Test
        run: cargo test --workspace

      - name: Doc build
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  # --------------------------------------------------------------------------
  # MSRV — verify the declared minimum supported Rust version
  # --------------------------------------------------------------------------
  msrv:
    name: MSRV (1.92)
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.92"

      - name: Install GStreamer dev libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev

      - uses: Swatinem/rust-cache@v2

      # MSRV check: build only (no clippy, since lint suggestions evolve)
      - name: Build (MSRV)
        run: cargo build --workspace

      - name: Test (MSRV)
        run: cargo test --workspace

  # --------------------------------------------------------------------------
  # Dependency audit — catch known vulnerabilities
  # --------------------------------------------------------------------------
  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # --------------------------------------------------------------------------
  # Build without GStreamer — verify the no-backend path compiles
  # --------------------------------------------------------------------------
  no-gst:
    name: Build (no GStreamer)
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build without gst-backend
        run: cargo build --workspace --no-default-features

      - name: Test without gst-backend
        run: cargo test --workspace --no-default-features
