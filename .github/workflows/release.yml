name: Release

on:
  push:
    tags:
      - "v[0-9]+.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

jobs:
  # --------------------------------------------------------------------------
  # Gate: run full CI before publishing
  # --------------------------------------------------------------------------
  ci:
    name: CI gate
    uses: ./.github/workflows/ci.yml

  # --------------------------------------------------------------------------
  # Publish crates to crates.io in dependency order
  # --------------------------------------------------------------------------
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install GStreamer dev libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev

      # Publish in strict dependency order. Each crate waits for its
      # dependencies to be indexed before publishing. The sleep between
      # publishes gives the crates.io index time to propagate.
      - name: Publish nv-core
        run: cargo publish -p nv-core --no-verify
      - run: sleep 30

      - name: Publish nv-frame
        run: cargo publish -p nv-frame --no-verify
      - run: sleep 30

      - name: Publish nv-view
        run: cargo publish -p nv-view --no-verify
      - run: sleep 30

      - name: Publish nv-perception
        run: cargo publish -p nv-perception --no-verify
      - run: sleep 30

      - name: Publish nv-media
        run: cargo publish -p nv-media --no-verify
      - run: sleep 30

      - name: Publish nv-temporal
        run: cargo publish -p nv-temporal --no-verify
      - run: sleep 30

      - name: Publish nv-test-util
        run: cargo publish -p nv-test-util --no-verify
      - run: sleep 30

      - name: Publish nv-runtime
        run: cargo publish -p nv-runtime --no-verify
      - run: sleep 30

      - name: Publish nv-metrics
        run: cargo publish -p nv-metrics --no-verify

  # --------------------------------------------------------------------------
  # Create GitHub Release with changelog body
  # --------------------------------------------------------------------------
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog section
        id: changelog
        run: |
          # Extract the section for this version from CHANGELOG.md.
          # Matches from "## [x.y.z]" to the next "## [" or EOF.
          version="${{ steps.version.outputs.version }}"
          body=$(awk -v ver="$version" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]")) found=1
              next
            }
            found { print }
          ' CHANGELOG.md)
          # Write to file for the release action (multiline-safe).
          echo "$body" > /tmp/release-body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-body.md
          generate_release_notes: false
